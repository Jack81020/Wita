<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="icon" type="image/png" href="assets/favicon-wita.png" />
  <title>Contatti | Portale Mentorage</title>
  <link rel="stylesheet" href="products.css" />
  <link rel="stylesheet" href="contatti.css" />
  <link rel="stylesheet" href="components/shared-components.css" />
</head>
<body>
  <site-navbar></site-navbar>

  <main class="contatti-main" id="main">
    <div class="contatti-container">
      <div class="contatti-content">
        <div class="contatti-text">
          <h1 class="contatti-title">Scopri come prevenire i rischi<br/>e intervenire tempestivamente</h1>
          <p class="contatti-desc">Compila il modulo per organizzare una breve chiamata conoscitiva<br/>e scoprire i vantaggi di Mentorage per la tua struttura.</p>
        </div>
        
        <div class="contatti-form-wrapper">
          <form class="contatti-form" action="#" method="POST">
            <input type="text" class="contatti-input" placeholder="Nome" aria-label="Nome" required />
            <input type="text" class="contatti-input" placeholder="Azienda" aria-label="Azienda" required />
            <input type="email" class="contatti-input" placeholder="Email" aria-label="Email" required />
            <textarea class="contatti-input contatti-textarea" placeholder="Messaggio" aria-label="Messaggio" rows="4" required></textarea>
            
            <label class="contatti-checkbox-label">
              <input type="checkbox" required class="contatti-checkbox" />
              <span>DICHIARO di aver preso visione dell'<a href="privacy.html" class="contatti-privacy-link" target="_blank">informativa</a> relativa al trattamento dei dati personali.</span>
            </label>
            
            <button type="submit" class="contatti-submit">Invia messaggio</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <site-footer></site-footer>

  <script type="module" src="components/shared-components.js"></script>
  <script src="products.js"></script>
</body>
</html>
